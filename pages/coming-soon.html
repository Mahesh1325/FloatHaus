<html lang="en" dir="ltr">

<head>

    <!DOCTYPE html>
    <html lang="en" dir="ltr">

    <head>
        <meta charset="UTF-8">
        <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Coming Soon | Sensory Deprivation Float Center</title>
        <link rel="stylesheet" href="../assets/css/style.css">
        <link rel="stylesheet" href="../assets/css/dark-mode.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
            rel="stylesheet">
        <style>
            .coming-soon-wrapper {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: var(--spacing-lg);
                position: relative;
                background-color: var(--theme-bg);
                color: #fff;
                overflow: hidden;
            }

            /* Dynamic animated gradient overlay */
            .coming-soon-wrapper::before {
                content: '';
                position: absolute;
                inset: 0;
                background: linear-gradient(135deg, rgba(15, 23, 42, 0.4), rgba(4, 11, 22, 0.95)), url('../assets/img/hero-about.jpg') center/cover;
                z-index: 0;
                filter: brightness(0.6) saturate(1.2);
                animation: pulse-bg 15s infinite alternate ease-in-out;
            }

            @keyframes pulse-bg {
                0% {
                    transform: scale(1);
                    filter: brightness(0.5) saturate(1.1);
                }

                100% {
                    transform: scale(1.05);
                    filter: brightness(0.7) saturate(1.3);
                }
            }

            /* Subtle glowing orb */
            .coming-soon-wrapper::after {
                content: '';
                position: absolute;
                width: 40vw;
                height: 40vw;
                background: radial-gradient(circle, var(--theme-accent) 0%, transparent 60%);
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                filter: blur(100px);
                opacity: 0.15;
                z-index: 0;
                animation: breathe 8s infinite alternate ease-in-out;
            }

            @keyframes breathe {
                0% {
                    opacity: 0.1;
                    transform: translate(-50%, -50%) scale(0.9);
                }

                100% {
                    opacity: 0.2;
                    transform: translate(-50%, -50%) scale(1.1);
                }
            }

            .cs-content {
                position: relative;
                z-index: 2;
                max-width: 650px;
                width: 100%;
            }

            .cs-logo {
                font-size: 2rem;
                margin-bottom: var(--spacing-lg);
                color: var(--theme-accent);
                font-family: var(--font-serif);
                letter-spacing: 3px;
            }

            .cs-title {
                color: #fff;
                margin-bottom: var(--spacing-md);
                font-family: var(--font-serif);
                font-size: clamp(3rem, 8vw, 5rem);
                line-height: 1.1;
                letter-spacing: -0.02em;
                text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            }

            .cs-desc {
                color: rgba(255, 255, 255, 0.9);
                font-size: 1.25rem;
                margin-bottom: var(--spacing-xl);
                line-height: 1.6;
                text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
                font-weight: 300;
            }

            .countdown-wrapper {
                display: flex;
                justify-content: center;
                gap: var(--spacing-md);
                margin-bottom: var(--spacing-xl);
            }

            .countdown-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                background: rgba(255, 255, 255, 0.03);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                padding: 1.25rem 1.5rem;
                border-radius: var(--border-radius-lg);
                min-width: 100px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            }

            .countdown-number {
                font-family: var(--font-serif);
                font-size: 3rem;
                font-weight: 300;
                color: #fff;
                line-height: 1;
                margin-bottom: 0.5rem;
            }

            .countdown-label {
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 2px;
                color: var(--theme-accent);
                font-weight: 600;
            }

            .cs-form {
                background: rgba(255, 255, 255, 0.03);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                padding: var(--spacing-lg);
                border-radius: var(--border-radius-lg);
                border: 1px solid rgba(255, 255, 255, 0.1);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            }

            .cs-form form {
                display: flex;
                gap: 0.5rem;
            }

            .cs-form input {
                padding: 1.2rem;
                flex: 1;
                background: rgba(255, 255, 255, 0.05) !important;
                color: white !important;
                border: 1px solid rgba(255, 255, 255, 0.2) !important;
                border-radius: var(--border-radius) !important;
                font-size: 1rem;
                transition: all 0.3s ease;
            }

            .cs-form input:focus {
                background: rgba(255, 255, 255, 0.1) !important;
                border-color: var(--theme-accent) !important;
                outline: none;
                box-shadow: 0 0 0 3px rgba(245, 201, 122, 0.2);
            }

            .cs-form input::placeholder {
                color: rgba(255, 255, 255, 0.5);
            }

            @media (max-width: 640px) {
                .countdown-wrapper {
                    gap: 0.5rem;
                }

                .countdown-item {
                    padding: 1rem 0.5rem;
                    min-width: 75px;
                }

                .countdown-number {
                    font-size: 2rem;
                }

                .cs-form form {
                    flex-direction: column;
                }
            }
        </style>
        <link rel="stylesheet" href="../assets/css/tailwind.css">
        <link rel="stylesheet" href="../assets/css/responsive.css">
        <link rel="stylesheet" href="../assets/css/rtl.css">
    
    <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
</head>

<body>
    <main class="coming-soon-wrapper">
        <div class="cs-content animate-fade-up">
            <div class="cs-logo" style="animation: fade-in-down 1s ease-out;"><strong>FloatHaus</strong></div>
            <h1 class="cs-title" style="animation: fade-in-up 1s ease-out 0.2s both;">A New Era of Stillness.</h1>
            <p class="cs-desc" style="animation: fade-in-up 1s ease-out 0.4s both;">
                We are building the ultimate sanctuary for mental clarity and physical recovery. Join our exclusive
                waitlist to secure early access and a Founders' Lifetime Rate on memberships.
            </p>

            <div class="countdown-wrapper" style="animation: fade-in-up 1s ease-out 0.6s both;">
                <div class="countdown-item">
                    <span class="countdown-number" id="cd-days">--</span>
                    <span class="countdown-label">Days</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="cd-hours">--</span>
                    <span class="countdown-label">Hours</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="cd-minutes">--</span>
                    <span class="countdown-label">Minutes</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="cd-seconds">--</span>
                    <span class="countdown-label">Seconds</span>
                </div>
            </div>

            <div class="cs-form" style="animation: fade-in-up 1s ease-out 0.8s both;">
                <form action="#" method="POST" aria-label="Waitlist Subscription">
                    <label for="waitlist-email" class="sr-only">Email Address</label>
                    <input type="email" id="waitlist-email" name="email" class="form-control"
                        placeholder="Enter your email address to get notified..." required aria-required="true">
                    <button type="submit" class="btn btn-primary"
                        style="padding: 1.2rem 2.5rem; font-size: 1.1rem; white-space: nowrap;">Join Waitlist</button>
                </form>
            </div>

            <div
                style="margin-top: calc(var(--spacing-xl) * 1.5); display: flex; gap: 2rem; justify-content: center; animation: fade-in 1s ease-out 1s both;">
                <a href="../index.html"
                    style="color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s;">Return
                    Home</a>
                <a href="contact.html"
                    style="color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s;">Contact
                    Us</a>
            </div>
        </div>
    </main>
    <script src="../assets/js/main.js"></script>
    <script>
        // Set launch date to 30 days from now
        const launchDate = new Date();
        launchDate.setDate(launchDate.getDate() + 30);

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = launchDate.getTime() - now;

            if (distance < 0) {
                document.getElementById('cd-days').innerText = "00";
                document.getElementById('cd-hours').innerText = "00";
                document.getElementById('cd-minutes').innerText = "00";
                document.getElementById('cd-seconds').innerText = "00";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('cd-days').innerText = days.toString().padStart(2, '0');
            document.getElementById('cd-hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('cd-minutes').innerText = minutes.toString().padStart(2, '0');
            document.getElementById('cd-seconds').innerText = seconds.toString().padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>

</html>
