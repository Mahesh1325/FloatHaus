<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | FloatHaus</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/tailwind.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
    <style>
        :root {
            --auth-card-width: 1100px;
            --auth-card-height: 700px;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--theme-bg);
            margin: 0;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        .ambient-blob {
            position: fixed;
            width: 40vw;
            height: 40vw;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.15;
            border-radius: 50%;
            animation: moveBlobs 25s infinite alternate ease-in-out;
        }
        .blob-1 { 
            top: -10%; 
            right: -10%; 
            background: linear-gradient(45deg, var(--primary), var(--accent)); 
        }
        .blob-2 { 
            bottom: -10%; 
            left: -10%; 
            background: linear-gradient(45deg, var(--accent), var(--primary));
            animation-delay: -7s;
        }

        @keyframes moveBlobs {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-10vw, -5vh) scale(1.15); }
        }

        .auth-container {
            width: 100%;
            max-width: var(--auth-card-width);
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98) translateY(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .auth-card-combined {
            display: flex;
            align-items: stretch; /* Stretch children to fill height */
            background: var(--theme-surface);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--theme-border);
            min-height: var(--auth-card-height);
            backdrop-filter: blur(12px);
        }

        .auth-image-side {
            flex: 1.5;
            position: relative;
            display: none;
        }

        @media (min-width: 950px) {
            .auth-image-side { display: block; }
        }

        .auth-image-side img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.75);
        }

        .image-overlay-content {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.2));
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            color: #fff;
            text-align: center;
        }

        .auth-form-side {
            flex: 1;
            padding: 3.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--theme-surface);
            overflow-y: auto;
        }

        .header-controls {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .logo-top {
            position: absolute;
            top: 2rem;
            left: 2rem;
            text-decoration: none;
            z-index: 100;
        }

        [dir="rtl"] .logo-top { left: auto; right: 2rem; }
        [dir="rtl"] .header-controls { right: auto; left: 2rem; }

        .floating-content {
            animation: floatY 7s infinite ease-in-out;
        }

        .floating-content-delayed {
            animation: floatY 7s infinite ease-in-out;
            animation-delay: 2.5s;
        }

        @keyframes floatY {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .form-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.6rem;
            color: var(--theme-text-muted);
        }

        .form-control {
            width: 100%;
            padding: 1.1rem 1.25rem;
            border-radius: 16px;
            background: rgba(var(--rgb-theme-bg), 0.4);
            border: 1px solid var(--theme-border);
            color: var(--theme-text);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
            backdrop-filter: blur(5px);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(var(--rgb-theme-bg), 0.6);
            box-shadow: 0 0 0 4px rgba(var(--rgb-primary), 0.15);
            transform: translateY(-2px);
        }

        .btn-primary {
            width: 100%;
            padding: 1.1rem;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(var(--rgb-primary), 0.3);
        }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.85rem;
            border-radius: 14px;
            border: 1px solid var(--theme-border);
            background: var(--theme-bg);
            color: var(--theme-text);
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .social-btn:hover {
            background: rgba(var(--rgb-primary), 0.08);
            border-color: var(--primary);
        }

        @media (max-width: 650px) {
            .auth-form-side { padding: 2.5rem 1.5rem; }
            .form-grid-2 { grid-template-columns: 1fr; gap: 1rem; }
        }
    </style>
</head>

<body>
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>

    <a href="../index.html" class="logo logo-top">FloatHaus</a>

    <div class="header-controls">
        <button type="button" id="dir-toggle" class="theme-toggle" style="width: auto; padding: 0 0.75rem; font-weight: bold;">
            <span id="dir-text">RTL</span>
        </button>
        <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
            <span id="theme-icon"></span>
        </button>
    </div>

    <div class="auth-container">
        <div class="auth-card-combined header-container">
            <!-- Image Side -->
            <div class="auth-image-side">
                <img src="../assets/img/auth_bg.jpg" alt="Sanctuary">
                <div class="image-overlay-content">
                    <div class="floating-content">
                        <h2 style="font-family: 'Playfair Display', serif; font-size: 3.2rem; margin-bottom: 1.5rem; line-height: 1.1;">Begin Your <br>Transformation</h2>
                    </div>
                    <div class="floating-content-delayed">
                        <p style="opacity: 0.85; line-height: 1.8; max-width: 350px; margin: 0 auto; font-size: 1.1rem;">Step into a realm where the world falls away. Create your portal to peace today</p>
                    </div>
                </div>
            </div>

            <!-- Form Side -->
            <div class="auth-form-side">
                <div style="margin-bottom: 2rem;">
                    <h1 style="font-size: 2.2rem; margin-bottom: 0.5rem; color: var(--theme-text); font-weight: 800; letter-spacing: -1px;">Join the Stillness</h1>
                    <p style="color: var(--theme-text-muted); font-size: 1rem;">Experience the power of nothingness.</p>
                </div>

                <form id="register-form" onsubmit="event.preventDefault(); window.simulateLogin();">
                    <div class="form-grid-2" style="margin-bottom: 1.25rem;">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" class="form-control" placeholder="Jane" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" class="form-control" placeholder="Doe" required>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 1.25rem;">
                        <label>Email Address</label>
                        <input type="email" class="form-control" placeholder="jane@example.com" required>
                    </div>

                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label>Password</label>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Create Account</button>

                    <div style="display: flex; align-items: center; margin: 1.5rem 0; color: var(--theme-text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700;">
                        <div style="flex: 1; height: 1px; background: var(--theme-border);"></div>
                        <span style="padding: 0 1rem;">Continue with</span>
                        <div style="flex: 1; height: 1px; background: var(--theme-border);"></div>
                    </div>

                    <div class="social-grid">
                        <button type="button" class="social-btn" onclick="window.simulateLogin()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                            Google
                        </button>
                        <button type="button" class="social-btn" onclick="window.simulateLogin()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c5.05-.5 9-4.76 9-9.95z" fill="#1877F2"/></svg>
                            Facebook
                        </button>
                    </div>

                    <p style="text-align: center; margin-top: 2rem; color: var(--theme-text-muted); font-size: 0.95rem;">
                        Already a member? <a href="login.html" style="color: var(--primary); font-weight: 700; text-decoration: none;">Log in here</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
</body>

</html>
